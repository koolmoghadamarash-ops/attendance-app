name: Build Futsal Coach Android APK

on:
  push:
    branches: [main]
    paths:
      - 'futsal-coach/futsal.html'
      - 'futsal-coach/capacitor-app/**'
      - '.github/workflows/futsal-android-build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        working-directory: futsal-coach/capacitor-app
        run: npm ci

      - name: Sync latest futsal.html into Capacitor web assets
        working-directory: futsal-coach/capacitor-app
        run: ./sync-web.sh

      - name: Capacitor sync
        working-directory: futsal-coach/capacitor-app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: futsal-coach/capacitor-app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: futsal-coach-debug-apk
          path: futsal-coach/capacitor-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
