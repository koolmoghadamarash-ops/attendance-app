<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Tahoma;background:#1a1a2e;color:#fff;padding:20px}
.tab{padding:8px 14px;border:none;cursor:pointer;border-radius:8px;margin:3px;font-family:Tahoma;font-size:13px;background:#333;color:#fff}
.tab.active{background:#00d4ff;color:#000}
.tab-content{display:none;padding:20px;background:#16213e;border-radius:10px;margin-top:10px}
</style>
</head>
<body>
<div>
  <button class="tab active" onclick="adminTab('reports',this)">گزارش</button>
  <button class="tab" onclick="adminTab('messages',this)">پیام‌ها</button>
  <button class="tab" onclick="adminTab('tracking',this)">ردیابی</button>
  <button class="tab" onclick="adminTab('workhours',this)">ساعت کاری</button>
</div>
<div id="tab-reports" class="tab-content" style="display:block">محتوای گزارش ✅</div>
<div id="tab-messages" class="tab-content">محتوای پیام‌ها ✅</div>
<div id="tab-tracking" class="tab-content">محتوای ردیابی ✅</div>
<div id="tab-workhours" class="tab-content">محتوای ساعت کاری ✅</div>

<script>
function adminTab(tab,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(c){c.style.display='none';});
  document.getElementById('tab-'+tab).style.display='block';
}
</script>
</body>
</html>
