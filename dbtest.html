<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{font-family:Tahoma;padding:20px;background:#111;color:#0f0;font-size:15px;text-align:center}
button{padding:16px 24px;background:#00d4ff;color:#000;border:none;border-radius:12px;width:100%;margin:10px 0;font-size:17px;font-weight:bold}
video{width:100%;border-radius:12px;margin-top:12px;background:#000}
div{margin:8px 0;padding:10px;background:#222;border-radius:8px;word-break:break-all;text-align:right}</style>
</head><body>
<h3>تست مستقیم دوربین</h3>
<div id="info"></div>
<button onclick="test()">باز کردن دوربین</button>
<video id="v" autoplay playsinline></video>
<script>
var I=document.getElementById('info');
function log(m,c){I.innerHTML='<div style="color:'+(c||'#0f0')+'">'+m+'</div>'+I.innerHTML;}
log('پروتکل: '+location.protocol, location.protocol==='https:'?'#0f0':'#f00');
log('mediaDevices: '+(navigator.mediaDevices?'هست':'نیست'),navigator.mediaDevices?'#0f0':'#f00');

function test(){
  log('دکمه زده شد، در حال درخواست دوربین...','#ff0');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    log('getUserMedia پشتیبانی نمیشود!','#f00');return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
  .then(function(stream){
    log('دوربین باز شد! ✅','#0f0');
    document.getElementById('v').srcObject=stream;
  })
  .catch(function(e){
    log('خطا: '+e.name+' - '+e.message,'#f00');
  });
}
</script></body></html>
