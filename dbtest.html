<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>body{font-family:monospace;padding:20px;background:#111;color:#0f0;font-size:13px}
div{margin:4px 0;padding:8px;background:#222;border-radius:4px;word-break:break-all}</style>
</head><body>
<h3>تست خواندن از دیتابیس</h3>
<div id="log">شروع...</div>
<script>
var API='https://bold-tereshkova-gqbaxsgi.liara.run/api.php';
var L=document.getElementById('log');
function log(m,c){L.innerHTML=L.innerHTML+'<div style="color:'+(c||'#0f0')+'">'+m+'</div>';}

log('صفحه: '+location.protocol,'#ff0');

function dbGet(t){
  return fetch(API+'?table='+t).then(function(r){return r.ok?r.json():[];}).catch(function(e){log(t+' خطا: '+e.message,'#f00');return [];});
}

Promise.all([dbGet('locations'),dbGet('personnel'),dbGet('logs'),dbGet('messages')]).then(function(res){
  log('شعبه‌ها: '+res[0].length+' تا','#0ff');
  log('پرسنل: '+res[1].length+' تا','#0ff');
  if(res[1].length>0){
    log('اولین پرسنل: '+JSON.stringify(res[1][0]),'#0f0');
  }
  log('لاگ‌ها: '+res[2].length+' تا','#0ff');
  log('پیام‌ها: '+res[3].length+' تا','#0ff');
});
</script></body></html>
