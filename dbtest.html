<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Tahoma;padding:12px;background:#0a1628;color:#fff;text-align:center}
button{padding:14px;background:#00d4ff;color:#000;border:none;border-radius:10px;width:100%;margin:6px 0;font-weight:bold}
video{width:100%;height:260px;object-fit:cover;border-radius:10px;background:#222;display:block;margin:6px 0}
.box{border:2px solid #00d4ff;border-radius:10px;padding:8px;margin:10px 0}
#log div{font-size:11px;padding:4px;background:#162540;margin:2px 0;border-radius:4px;text-align:right}
</style>
</head><body>
<h3>تست نهایی دوربین</h3>
<button onclick="go()">📷 باز کردن دوربین</button>

<div class="box">روش ۱: ساده
<video id="v1" autoplay playsinline muted></video></div>

<div id="log"></div>
<script>
var L=document.getElementById('log');
function log(m){L.innerHTML='<div>'+m+'</div>'+L.innerHTML;}
log('پروتکل: '+location.protocol+' | مرورگر: '+navigator.userAgent.substring(0,40));
function go(){
  log('درخواست...');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false}).then(function(s){
    var v1=document.getElementById('v1');
    v1.srcObject=s;
    var p=v1.play();
    if(p&&p.then)p.then(function(){log('✅ play موفق');}).catch(function(e){log('❌ play رد شد: '+e.name);});
    v1.onplaying=function(){log('🎥 onplaying - تصویر باید باشد!');};
    v1.onloadeddata=function(){log('📦 onloadeddata - '+v1.videoWidth+'x'+v1.videoHeight);};
    log('استریم ست شد');
  }).catch(function(e){log('❌ getUserMedia: '+e.name);});
}
</script></body></html>
