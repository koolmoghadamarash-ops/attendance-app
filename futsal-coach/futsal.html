<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚽ Futsal Coach Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a1a;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;}

#hdr{display:flex;align-items:center;justify-content:space-between;
  height:44px;padding:0 12px;background:#0f172a;border-bottom:1px solid #1e293b;}
#hdr h1{font-size:13px;font-weight:800;letter-spacing:1px;color:#fff;}
.hb{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;}

#board{
  display:block;
  width:100vw;
  height:52vw;
  background:#071528;
  touch-action:none;
  cursor:crosshair;
}

#ctrl{background:#0f172a;border-top:1px solid #1e293b;padding:8px 10px;}
.lbl{font-size:10px;color:#64748b;text-align:right;margin-bottom:4px;}

/* ابزارها - wrap به خط بعدی */
.tg{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.tb{display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 6px;border-radius:9px;background:#1e293b;
  border:1.5px solid transparent;min-width:44px;
  font-size:8px;color:#64748b;cursor:pointer;flex-shrink:0;}
.tb span{font-size:17px;line-height:1.1;}
.tb.on{background:#14532d;border-color:#4ade80;color:#4ade80;}
.tb.del{background:#1e0a0a;}
.tb.del.on{background:#7f1d1d;border-color:#ef4444;color:#ef4444;}

.row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
.cd{width:22px;height:22px;border-radius:50%;border:2px solid #334155;cursor:pointer;flex-shrink:0;}
.cd.on{border:3px solid #fff;transform:scale(1.2);}
.sp{width:1px;height:20px;background:#334155;}
.wb{width:30px;height:22px;display:flex;align-items:center;justify-content:center;
  background:#1e293b;border-radius:6px;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;}
.wb.on{border-color:#4ade80;}
.wl{width:16px;background:#fff;border-radius:1px;}

/* بخش بازیکنان */
.pr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px;align-items:center;}
.pa{padding:6px 12px;border-radius:8px;border:1.5px solid #334155;
  font-size:12px;font-weight:700;cursor:pointer;color:#e2e8f0;background:#1e293b;}
.pa.a{border-color:#ef4444;color:#ef4444;}
.pa.b{border-color:#3b82f6;color:#3b82f6;}

.ar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
.ab{padding:6px 11px;background:#1e293b;border:1.5px solid #334155;
  border-radius:8px;color:#e2e8f0;font-size:12px;font-weight:600;cursor:pointer;}
.ab.pl{background:#14532d;border-color:#4ade80;}
.ab.st{background:#7f1d1d;border-color:#ef4444;}

#frow{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.fd{width:22px;height:22px;border-radius:50%;background:#1e293b;border:1.5px solid #334155;
  display:flex;align-items:center;justify-content:center;font-size:8px;cursor:pointer;color:#94a3b8;flex-shrink:0;}
.fd.on{background:#4ade80;color:#0a0a1a;font-weight:700;border-color:#4ade80;}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;
  align-items:center;justify-content:center;}
#modal.show{display:flex;}
.mc{background:#1e293b;border-radius:18px;padding:20px;width:84%;
  border:1px solid #334155;display:flex;flex-direction:column;gap:12px;}
.mc h2{text-align:center;font-size:15px;color:#fff;}
.mc input{background:#0a0a1a;border:1px solid #334155;border-radius:10px;
  padding:10px;color:#fff;font-size:15px;text-align:right;direction:rtl;width:100%;outline:none;}
.mb{display:flex;gap:10px;}
.mb button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
.bc{background:#334155;color:#94a3b8;}
.bs{background:#166534;color:#fff;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#15803d;color:#fff;padding:8px 18px;border-radius:18px;
  font-size:12px;font-weight:600;opacity:0;pointer-events:none;
  transition:opacity .25s;z-index:1000;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="hdr">
  <button class="hb" onclick="openSave()">💾</button>
  <h1>⚽ FUTSAL COACH PRO</h1>
  <button class="hb" onclick="exportImg()">📤</button>
</div>

<canvas id="board"></canvas>

<div id="ctrl">
  <div class="lbl">▸ ابزار</div>
  <div class="tg">
    <div class="tb on" data-t="select" onclick="ST(this)"><span>☝️</span>جابجایی</div>
    <div class="tb"    data-t="arrow"  onclick="ST(this)"><span>➡️</span>فلش</div>
    <div class="tb"    data-t="line"   onclick="ST(this)"><span>📏</span>خط</div>
    <div class="tb"    data-t="pen"    onclick="ST(this)"><span>✏️</span>قلم</div>
    <div class="tb"    data-t="zone"   onclick="ST(this)"><span>⭕</span>منطقه</div>
    <div class="tb del" data-t="rmplayer" onclick="ST(this)"><span>❌</span>حذف</div>
    <div class="tb"    onclick="undo()"><span>↩️</span>بازگشت</div>
    <div class="tb"    onclick="resetAll()"><span>🔄</span>ریست</div>
  </div>

  <div class="lbl">▸ رنگ و ضخامت</div>
  <div class="row">
    <div class="cd on"  style="background:#fff"    data-c="#ffffff" onclick="SC(this)"></div>
    <div class="cd"     style="background:#fbbf24" data-c="#fbbf24" onclick="SC(this)"></div>
    <div class="cd"     style="background:#ef4444" data-c="#ef4444" onclick="SC(this)"></div>
    <div class="cd"     style="background:#3b82f6" data-c="#3b82f6" onclick="SC(this)"></div>
    <div class="cd"     style="background:#4ade80" data-c="#4ade80" onclick="SC(this)"></div>
    <div class="cd"     style="background:#f97316" data-c="#f97316" onclick="SC(this)"></div>
    <div class="cd"     style="background:#a78bfa" data-c="#a78bfa" onclick="SC(this)"></div>
    <div class="sp"></div>
    <div class="wb on" data-w="2" onclick="SW(this)"><div class="wl" style="height:2px"></div></div>
    <div class="wb"    data-w="4" onclick="SW(this)"><div class="wl" style="height:4px"></div></div>
    <div class="wb"    data-w="7" onclick="SW(this)"><div class="wl" style="height:7px"></div></div>
  </div>

  <div class="lbl">▸ بازیکنان</div>
  <div class="pr">
    <button class="pa a" onclick="addPlayer('A')">+ تیم A 🔴</button>
    <button class="pa b" onclick="addPlayer('B')">+ تیم B 🔵</button>
    <button class="pa"   onclick="addPlayer('X')">+ توپ ⚽</button>
  </div>

  <div class="lbl">▸ انیمیشن &nbsp;<span id="fc" style="color:#4ade80;font-weight:700">0</span> فریم</div>
  <div class="ar">
    <button class="ab" onclick="addFrame()">+ فریم</button>
    <button class="ab" id="rmB" onclick="rmFrame()" style="display:none">- فریم</button>
    <button class="ab pl" id="plB" onclick="togglePlay()">▶ پخش</button>
    <button class="ab" id="spB" onclick="cycleSpeed()">1x</button>
  </div>
  <div id="frow"></div>
</div>

<div id="modal">
  <div class="mc">
    <h2>💾 ذخیره تاکتیک</h2>
    <input id="pn" type="text" value="تاکتیک جدید" placeholder="نام تاکتیک">
    <div class="mb">
      <button class="bc" onclick="closeM()">انصراف</button>
      <button class="bs" onclick="doSave()">ذخیره ✓</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
var board = document.getElementById('board');
var ctx   = board.getContext('2d');

var tool='select', color='#ffffff', lw=2;
var paths=[], curPath=null;
var keyframes=[], curFrame=0;
var playing=false, animReq=null;
var speeds=[900,550,280], sIdx=0;
var animFrom=0, animTo=1, animStart=null;
var players=[];
var drag=null;
var FW=375, FH=195;

// ── راه‌اندازی کانواس ──────────────────
var booted=false;
function boot(){
  var newFW=board.getBoundingClientRect().width;
  if(newFW<50) newFW=window.innerWidth||screen.width||375;
  if(newFW<50) newFW=375;
  FW=newFW;
  FH=Math.round(FW*0.52);
  var PR=Math.min(window.devicePixelRatio||1,2);
  board.width=Math.round(FW*PR);
  board.height=Math.round(FH*PR);
  board.style.width=FW+'px';
  board.style.height=FH+'px';
  ctx.setTransform(PR,0,0,PR,0,0);
  if(!booted){players=mkPlayers();booted=true;}
  redraw();
}

// ── بازیکنان ──────────────────────────
function mkPlayers(){
  var cy=FH/2;
  return [
    {id:'A1',t:'A',n:1,x:FW*.08,y:cy},
    {id:'A2',t:'A',n:2,x:FW*.22,y:FH*.22},
    {id:'A3',t:'A',n:3,x:FW*.22,y:FH*.78},
    {id:'A4',t:'A',n:4,x:FW*.34,y:FH*.38},
    {id:'A5',t:'A',n:5,x:FW*.42,y:cy},
    {id:'B1',t:'B',n:1,x:FW*.92,y:cy},
    {id:'B2',t:'B',n:2,x:FW*.78,y:FH*.22},
    {id:'B3',t:'B',n:3,x:FW*.78,y:FH*.78},
    {id:'B4',t:'B',n:4,x:FW*.66,y:FH*.65},
    {id:'B5',t:'B',n:5,x:FW*.58,y:cy},
    {id:'bl',t:'X',n:0,x:FW*.5,y:FH*.5}
  ];
}

function addPlayer(team){
  if(team==='X'){
    // یک توپ اضافی فقط اگه قبلاً نیست
    var cx=FW*.5+Math.random()*30-15, cy=FH*.5+Math.random()*20-10;
    var uid='bl'+(Date.now()%10000);
    players.push({id:uid,t:'X',n:0,x:cx,y:cy});
    toast('توپ اضافه شد');
  } else {
    var existing=players.filter(function(p){return p.t===team;});
    var nextN=existing.length+1;
    var uid2=team+nextN+'_'+Date.now();
    var cx2=FW*.5+(Math.random()*40-20);
    var cy2=FH*.5+(Math.random()*30-15);
    players.push({id:uid2,t:team,n:nextN,x:cx2,y:cy2});
    toast('بازیکن '+nextN+' تیم '+team+' اضافه شد');
  }
  redraw();
}

function removePlayer(p){
  players=players.filter(function(pl){return pl.id!==p.id;});
  toast('بازیکن حذف شد');
  // بعد از حذف، برگشت به ابزار جابجایی
  tool='select';
  document.querySelectorAll('.tb[data-t]').forEach(function(b){b.classList.remove('on');});
  var selBtn=document.querySelector('.tb[data-t="select"]');
  if(selBtn) selBtn.classList.add('on');
  redraw();
}

// ── رسم همه چیز ───────────────────────
function redraw(){
  ctx.clearRect(0,0,FW,FH);
  drawField();
  paths.forEach(function(p){drawPath(p);});
  if(curPath) drawPath(curPath);
  players.forEach(function(p){drawPlayer(p);});
}

// ── زمین فوتسال ───────────────────────
function drawField(){
  var pad=6,fw=FW-pad*2,fh=FH-pad*2,fx=pad,fy=pad;
  var cx=FW/2,cy=FH/2;

  // پس‌زمینه کل canvas (بیرون زمین)
  ctx.fillStyle='#071528';
  ctx.fillRect(0,0,FW,FH);

  // سطح زمین فوتسال - آبی hard court با نوار عمودی
  for(var i=0;i<6;i++){
    ctx.fillStyle=i%2===0?'#0e2649':'#112d56';
    ctx.fillRect(fx+i*fw/6,fy,fw/6+1,fh);
  }

  var W=1.8;
  ctx.strokeStyle='rgba(255,255,255,0.92)';
  ctx.lineWidth=W;

  // کادر زمین
  ctx.strokeRect(fx,fy,fw,fh);

  // خط مرکزی
  ctx.beginPath();ctx.moveTo(cx,fy);ctx.lineTo(cx,fy+fh);ctx.stroke();

  // دایره مرکزی (r=3m → fw*3/40=fw*0.075)
  var cr=fw*0.075;
  ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fill();ctx.stroke();

  // نقطه مرکز
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.arc(cx,cy,2.5,0,Math.PI*2);ctx.fill();

  // قوس پنالتی فوتسال: نیمه‌دایره r=6m → fw*6/40=fw*0.15
  // مرکز = وسط خط دروازه (روی کادر)
  var ar=fw*0.15;
  ctx.fillStyle='rgba(255,255,255,0.05)';

  // چپ: قوس باز به سمت داخل (راست)
  ctx.beginPath();
  ctx.arc(fx,cy,ar,-Math.PI/2,Math.PI/2);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.arc(fx,cy,ar,-Math.PI/2,Math.PI/2);
  ctx.stroke();

  // راست: قوس باز به سمت داخل (چپ)
  ctx.beginPath();
  ctx.arc(fx+fw,cy,ar,Math.PI/2,3*Math.PI/2);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.arc(fx+fw,cy,ar,Math.PI/2,3*Math.PI/2);
  ctx.stroke();

  // نقطه پنالتی اول (6m=15%)
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.arc(fx+ar,cy,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(fx+fw-ar,cy,2.5,0,Math.PI*2);ctx.fill();

  // نقطه پنالتی دوم (10m=25%)
  ctx.beginPath();ctx.arc(fx+fw*0.25,cy,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(fx+fw-fw*0.25,cy,2.5,0,Math.PI*2);ctx.fill();

  // دروازه (عرض ≈22% ارتفاع، عمق ≈4% عرض)
  var gH=fh*0.22,gD=Math.max(fw*0.04,8),gY=cy-fh*0.11;
  ctx.fillStyle='rgba(255,255,255,0.10)';
  ctx.fillRect(fx-gD,gY,gD,gH);
  ctx.fillRect(fx+fw,gY,gD,gH);
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1.5;
  ctx.strokeRect(fx-gD,gY,gD,gH);
  ctx.strokeRect(fx+fw,gY,gD,gH);

  // قوس گوشه‌ها (r≈1.5%)
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=1.5;
  var ca=fw*0.015;
  [[fx,fy,0,Math.PI*.5],[fx+fw,fy,.5*Math.PI,Math.PI],
   [fx+fw,fy+fh,Math.PI,1.5*Math.PI],[fx,fy+fh,1.5*Math.PI,2*Math.PI]].forEach(function(a){
    ctx.beginPath();ctx.arc(a[0],a[1],ca,a[2],a[3]);ctx.stroke();
  });

  // تیک‌های منطقه تعویض (5m=12.5%fh هر طرف از مرکز)
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;
  var tk=fh*0.125,td=8;
  [[cx-tk,fy],[cx+tk,fy],[cx-tk,fy+fh],[cx+tk,fy+fh]].forEach(function(p){
    var dir=p[1]===fy?1:-1;
    ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[0],p[1]+dir*td);ctx.stroke();
  });
}

// ── رسم بازیکن ────────────────────────
function drawPlayer(p){
  var isBall=p.t==='X';
  var r=isBall?11:14;
  var col=isBall?'#fbbf24':p.t==='A'?'#ef4444':'#3b82f6';
  ctx.save();
  // در حالت حذف، دور بازیکن قرمز می‌شه
  if(tool==='rmplayer'){
    ctx.shadowColor='#ef4444';ctx.shadowBlur=14;
  } else {
    ctx.shadowColor=col;ctx.shadowBlur=isBall?6:10;
  }
  ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
  ctx.fillStyle=col;ctx.fill();
  ctx.shadowBlur=0;
  if(tool==='rmplayer'){
    ctx.strokeStyle='#ef4444';ctx.lineWidth=2.5;ctx.stroke();
  } else {
    ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=1.5;ctx.stroke();
  }
  if(!isBall){
    ctx.fillStyle='#fff';
    ctx.font='bold '+(p.n>=10?9:12)+'px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.n,p.x,p.y);
  } else {
    ctx.font='12px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚽',p.x,p.y);
  }
  ctx.restore();
}

// ── رسم مسیر ──────────────────────────
function drawPath(p){
  if(!p||!p.pts||p.pts.length<2) return;
  ctx.save();
  ctx.strokeStyle=p.c;ctx.fillStyle=p.c;
  ctx.lineWidth=p.w;ctx.lineCap='round';ctx.lineJoin='round';
  var s=p.pts[0],e=p.pts[p.pts.length-1];
  if(p.type==='pen'){
    ctx.beginPath();ctx.moveTo(s.x,s.y);
    for(var i=1;i<p.pts.length-1;i++){
      var mx=(p.pts[i].x+p.pts[i+1].x)/2,my=(p.pts[i].y+p.pts[i+1].y)/2;
      ctx.quadraticCurveTo(p.pts[i].x,p.pts[i].y,mx,my);
    }
    ctx.lineTo(e.x,e.y);ctx.stroke();
  } else if(p.type==='line'){
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(e.x,e.y);ctx.stroke();
  } else if(p.type==='arrow'){
    var dx=e.x-s.x,dy=e.y-s.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len<8){ctx.restore();return;}
    var ux=dx/len,uy=dy/len,aw=9,al=14;
    ctx.beginPath();ctx.moveTo(s.x,s.y);
    ctx.lineTo(e.x-al*.6*ux,e.y-al*.6*uy);ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.x,e.y);
    ctx.lineTo(e.x-al*ux+aw*uy,e.y-al*uy-aw*ux);
    ctx.lineTo(e.x-al*ux-aw*uy,e.y-al*uy+aw*ux);
    ctx.closePath();ctx.fill();
  } else if(p.type==='zone'){
    var xs=p.pts.map(function(pt){return pt.x;}),ys=p.pts.map(function(pt){return pt.y;});
    var r2=Math.max((Math.max.apply(null,xs)-Math.min.apply(null,xs))/2,
                    (Math.max.apply(null,ys)-Math.min.apply(null,ys))/2,12);
    var cx2=(Math.min.apply(null,xs)+Math.max.apply(null,xs))/2;
    var cy2=(Math.min.apply(null,ys)+Math.max.apply(null,ys))/2;
    ctx.setLineDash([8,5]);
    ctx.beginPath();ctx.arc(cx2,cy2,r2,0,Math.PI*2);
    ctx.stroke();ctx.globalAlpha=.15;ctx.fill();
    ctx.globalAlpha=1;ctx.setLineDash([]);
  }
  ctx.restore();
}

// ── لمس ───────────────────────────────
function getXY(e){
  var r=board.getBoundingClientRect();
  var t=e.touches?e.touches[0]:e;
  var sx=(r.width>0)?FW/r.width:1,sy=(r.height>0)?FH/r.height:1;
  return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
}
function findP(x,y){
  return players.find(function(p){
    return Math.sqrt((p.x-x)*(p.x-x)+(p.y-y)*(p.y-y))<(p.t==='X'?18:22);
  });
}
function clamp(x,y){
  return{x:Math.max(12,Math.min(FW-12,x)),y:Math.max(12,Math.min(FH-12,y))};
}

board.addEventListener('touchstart',function(e){
  e.preventDefault();
  var pos=getXY(e);
  if(tool==='select'){
    var p=findP(pos.x,pos.y);
    if(p) drag={player:p,ox:pos.x-p.x,oy:pos.y-p.y};
    return;
  }
  if(tool==='rmplayer'){
    var p2=findP(pos.x,pos.y);
    if(p2) removePlayer(p2);
    return;
  }
  curPath={type:tool,pts:[{x:pos.x,y:pos.y}],c:color,w:lw};
},{passive:false});

board.addEventListener('touchmove',function(e){
  e.preventDefault();
  var pos=getXY(e);
  if(tool==='select'&&drag){
    var c=clamp(pos.x-drag.ox,pos.y-drag.oy);
    drag.player.x=c.x;drag.player.y=c.y;
    redraw();return;
  }
  if(curPath){
    if(tool==='arrow'||tool==='line')
      curPath.pts=[curPath.pts[0],{x:pos.x,y:pos.y}];
    else
      curPath.pts.push({x:pos.x,y:pos.y});
    redraw();
  }
},{passive:false});

board.addEventListener('touchend',function(e){
  e.preventDefault();
  drag=null;
  if(curPath&&curPath.pts.length>=2){
    if(tool==='arrow'||tool==='line')
      curPath.pts=[curPath.pts[0],curPath.pts[curPath.pts.length-1]];
    paths.push({type:curPath.type,pts:curPath.pts.slice(),c:curPath.c,w:curPath.w});
  }
  curPath=null;redraw();
},{passive:false});

// ── کنترل‌ها ──────────────────────────
function ST(el){
  tool=el.dataset.t;
  document.querySelectorAll('.tb[data-t]').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  redraw();
}
function SC(el){
  color=el.dataset.c;
  document.querySelectorAll('.cd').forEach(function(d){d.classList.remove('on');});
  el.classList.add('on');
}
function SW(el){
  lw=parseInt(el.dataset.w);
  document.querySelectorAll('.wb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
}
function undo(){paths.pop();redraw();}
function resetAll(){
  if(!confirm('همه چیز پاک شود؟')) return;
  paths=[];keyframes=[];curFrame=0;stopPlay();
  players=mkPlayers();updateFUI();redraw();
}

// ── انیمیشن ───────────────────────────
function addFrame(){
  keyframes.push({players:players.map(function(p){return Object.assign({},p);})});
  curFrame=keyframes.length-1;updateFUI();
  toast('فریم '+keyframes.length+' اضافه شد ✓');
}
function rmFrame(){keyframes.pop();curFrame=Math.max(0,curFrame-1);updateFUI();}
function gotoFrame(i){
  if(!keyframes[i]) return;
  curFrame=i;
  players=keyframes[i].players.map(function(p){return Object.assign({},p);});
  updateFUI();redraw();
}
function togglePlay(){
  if(playing){stopPlay();return;}
  if(keyframes.length<2){toast('حداقل ۲ فریم نیاز است');return;}
  playing=true;
  document.getElementById('plB').textContent='⏹ توقف';
  document.getElementById('plB').className='ab st';
  animFrom=0; animTo=1; animStart=null;
  animReq=requestAnimationFrame(animStep);
}
function animStep(ts){
  if(!playing) return;
  if(!animStart) animStart=ts;
  var dur=speeds[sIdx];
  var t=Math.min((ts-animStart)/dur, 1);
  // ease-in-out
  var e=t<0.5 ? 2*t*t : -1+(4-2*t)*t;
  var fA=keyframes[animFrom], fB=keyframes[animTo];
  players=fA.players.map(function(pa){
    var pb=fB.players.find(function(p){return p.id===pa.id;});
    if(!pb) return Object.assign({},pa);
    return Object.assign({},pa,{x:pa.x+(pb.x-pa.x)*e, y:pa.y+(pb.y-pa.y)*e});
  });
  redraw();
  if(t<1){
    animReq=requestAnimationFrame(animStep);
  } else {
    animFrom=animTo; animTo++;
    if(animTo>=keyframes.length){
      stopPlay();
      gotoFrame(keyframes.length-1);
    } else {
      animStart=null;
      animReq=requestAnimationFrame(animStep);
    }
  }
}
function stopPlay(){
  if(animReq){cancelAnimationFrame(animReq);animReq=null;}
  playing=false;
  document.getElementById('plB').textContent='▶ پخش';
  document.getElementById('plB').className='ab pl';
}
function cycleSpeed(){
  sIdx=(sIdx+1)%3;
  document.getElementById('spB').textContent=['1x','1.5x','2x'][sIdx];
}
function updateFUI(){
  document.getElementById('fc').textContent=keyframes.length;
  document.getElementById('rmB').style.display=keyframes.length?'':'none';
  var row=document.getElementById('frow');row.innerHTML='';
  keyframes.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='fd'+(i===curFrame?' on':'');d.textContent=i+1;
    d.onclick=function(){gotoFrame(i);};row.appendChild(d);
  });
}

// ── ذخیره / خروجی ─────────────────────
function openSave(){document.getElementById('modal').classList.add('show');}
function closeM(){document.getElementById('modal').classList.remove('show');}
function doSave(){
  var name=document.getElementById('pn').value||'تاکتیک';
  var all=JSON.parse(localStorage.getItem('fp2')||'[]');
  all.unshift({id:Date.now(),name:name,
    players:players.map(function(p){return Object.assign({},p);}),
    paths:paths.slice(),keyframes:keyframes.slice()});
  localStorage.setItem('fp2',JSON.stringify(all));
  closeM();toast('✅ ذخیره شد');
}
function exportImg(){
  var a=document.createElement('a');
  a.download='futsal-tactic.png';
  a.href=board.toDataURL('image/png');a.click();
  toast('📤 تصویر ذخیره شد');
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

// ── شروع ──────────────────────────────
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',boot);
} else {
  boot();
}
window.addEventListener('load',boot);
setTimeout(boot,150);
setTimeout(boot,600);
window.addEventListener('resize',function(){boot();players=mkPlayers();redraw();});
</script>
