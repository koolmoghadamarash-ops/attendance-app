<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>⚽ Futsal Coach Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;}
body{display:flex;flex-direction:column;font-family:system-ui,-apple-system,sans-serif;color:#e2e8f0;}

#header{
  height:48px;min-height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:#0f172a;
  border-bottom:1px solid #1e293b;
  flex-shrink:0;
  z-index:10;
}
#header h1{font-size:14px;font-weight:800;letter-spacing:1px;color:#fff;}
.hbtn{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;color:#fff;}

#field-wrap{
  position:relative;
  flex-shrink:0;
  background:#0a2e15;
  overflow:hidden;
}
#field-wrap canvas{position:absolute;top:0;left:0;}

#controls{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  background:#0f172a;
  border-top:1px solid #1e293b;
  padding:10px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  min-height:0;
}

.section-label{font-size:11px;color:#64748b;text-align:right;margin-bottom:4px;}

.scroll-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.scroll-row::-webkit-scrollbar{display:none;}

.tool-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 10px;border-radius:10px;background:#1e293b;
  border:1.5px solid transparent;cursor:pointer;
  min-width:58px;flex-shrink:0;
  font-size:9px;color:#64748b;
}
.tool-btn span{font-size:20px;}
.tool-btn.on{background:#14532d;border-color:#4ade80;color:#4ade80;}

.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;border:2px solid #334155;cursor:pointer;flex-shrink:0;}
.cdot.on{border:3px solid #fff;transform:scale(1.2);}
.sep{width:1px;height:24px;background:#334155;}
.wbtn{width:36px;height:26px;display:flex;align-items:center;justify-content:center;background:#1e293b;border-radius:6px;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;}
.wbtn.on{border-color:#4ade80;}

.anim-row{display:flex;gap:7px;flex-wrap:wrap;}
.abtn{
  padding:8px 14px;background:#1e293b;border:1.5px solid #334155;
  border-radius:8px;color:#e2e8f0;font-size:13px;font-weight:600;cursor:pointer;
  white-space:nowrap;
}
.abtn.play{background:#14532d;border-color:#4ade80;}
.abtn.stop{background:#7f1d1d;border-color:#ef4444;}

#frames{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.fdot{
  width:26px;height:26px;border-radius:50%;
  background:#1e293b;border:1.5px solid #334155;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;cursor:pointer;color:#94a3b8;flex-shrink:0;
}
.fdot.on{background:#4ade80;color:#0a0a1a;font-weight:700;border-color:#4ade80;}

/* Modal */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;align-items:center;justify-content:center;}
#modal.show{display:flex;}
.mcard{background:#1e293b;border-radius:18px;padding:22px;width:85%;max-width:340px;border:1px solid #334155;display:flex;flex-direction:column;gap:14px;}
.mcard h2{text-align:center;font-size:17px;color:#fff;}
.mcard input{background:#0a0a1a;border:1px solid #334155;border-radius:10px;padding:12px;color:#fff;font-size:15px;text-align:right;direction:rtl;width:100%;outline:none;}
.mbtns{display:flex;gap:10px;}
.mbtns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;}
.bcancel{background:#334155;color:#94a3b8;}
.bsave{background:#166534;color:#fff;}

/* Toast */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:#166534;color:#fff;padding:10px 22px;border-radius:20px;
  font-size:14px;font-weight:600;opacity:0;pointer-events:none;
  transition:opacity .25s;z-index:1000;white-space:nowrap;
}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- هدر -->
<div id="header">
  <button class="hbtn" onclick="openSave()">💾</button>
  <h1>⚽ FUTSAL COACH PRO</h1>
  <button class="hbtn" onclick="exportImg()">📤</button>
</div>

<!-- زمین بازی -->
<div id="field-wrap">
  <canvas id="c0"></canvas><!-- زمین -->
  <canvas id="c1"></canvas><!-- نقاشی -->
  <canvas id="c2"></canvas><!-- بازیکنان + لمس -->
</div>

<!-- کنترل‌ها -->
<div id="controls">

  <div>
    <div class="section-label">▸ ابزار</div>
    <div class="scroll-row">
      <div class="tool-btn on" data-t="select" onclick="setTool(this)"><span>☝️</span>جابجایی</div>
      <div class="tool-btn"    data-t="arrow"  onclick="setTool(this)"><span>➡️</span>فلش</div>
      <div class="tool-btn"    data-t="line"   onclick="setTool(this)"><span>📏</span>خط</div>
      <div class="tool-btn"    data-t="pen"    onclick="setTool(this)"><span>✏️</span>قلم</div>
      <div class="tool-btn"    data-t="zone"   onclick="setTool(this)"><span>⭕</span>منطقه</div>
      <div class="tool-btn"    onclick="undo()"><span>↩️</span>بازگشت</div>
      <div class="tool-btn"    onclick="resetAll()"><span>🔄</span>ریست</div>
    </div>
  </div>

  <div>
    <div class="section-label">▸ رنگ و ضخامت</div>
    <div class="row">
      <div class="cdot on"  style="background:#fff"    data-c="#ffffff" onclick="setC(this)"></div>
      <div class="cdot"     style="background:#fbbf24" data-c="#fbbf24" onclick="setC(this)"></div>
      <div class="cdot"     style="background:#ef4444" data-c="#ef4444" onclick="setC(this)"></div>
      <div class="cdot"     style="background:#3b82f6" data-c="#3b82f6" onclick="setC(this)"></div>
      <div class="cdot"     style="background:#4ade80" data-c="#4ade80" onclick="setC(this)"></div>
      <div class="cdot"     style="background:#f97316" data-c="#f97316" onclick="setC(this)"></div>
      <div class="cdot"     style="background:#a78bfa" data-c="#a78bfa" onclick="setC(this)"></div>
      <div class="sep"></div>
      <div class="wbtn on" data-w="2" onclick="setW(this)"><div style="width:18px;height:2px;background:#fff;border-radius:1px"></div></div>
      <div class="wbtn"    data-w="4" onclick="setW(this)"><div style="width:18px;height:4px;background:#fff;border-radius:1px"></div></div>
      <div class="wbtn"    data-w="7" onclick="setW(this)"><div style="width:18px;height:7px;background:#fff;border-radius:1px"></div></div>
    </div>
  </div>

  <div>
    <div class="section-label">▸ انیمیشن &nbsp; <span id="fcount" style="color:#4ade80">0</span> فریم</div>
    <div class="anim-row">
      <button class="abtn" onclick="addFrame()">+ فریم</button>
      <button class="abtn" id="rmBtn" onclick="rmFrame()" style="display:none">- فریم</button>
      <button class="abtn play" id="playBtn" onclick="togglePlay()">▶ پخش</button>
      <button class="abtn" id="spBtn" onclick="cycleSpeed()">1x</button>
    </div>
    <div id="frames"></div>
  </div>

</div>

<!-- Modal ذخیره -->
<div id="modal">
  <div class="mcard">
    <h2>💾 ذخیره تاکتیک</h2>
    <input id="pname" type="text" value="تاکتیک جدید" placeholder="نام تاکتیک">
    <div class="mbtns">
      <button class="bcancel" onclick="closeModal()">انصراف</button>
      <button class="bsave"   onclick="doSave()">ذخیره ✓</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
var tool='select', color='#ffffff', lw=2;
var paths=[], curPath=null;
var keyframes=[], curFrame=0;
var playing=false, timer=null;
var speeds=[800,500,250], speedIdx=0;
var players=[];
var drag=null; // {player, ox, oy}

// ════════════════════════════════════
//  CANVAS SETUP
// ════════════════════════════════════
var c0=document.getElementById('c0');
var c1=document.getElementById('c1');
var c2=document.getElementById('c2');
var x0=c0.getContext('2d');
var x1=c1.getContext('2d');
var x2=c2.getContext('2d');
var FW=1, FH=1, PR=1;

function setupCanvas(){
  PR = Math.min(window.devicePixelRatio||1, 2);
  FW = document.documentElement.clientWidth || window.innerWidth || 375;
  FH = Math.round(FW * 0.52);

  var wrap = document.getElementById('field-wrap');
  wrap.style.width  = FW+'px';
  wrap.style.height = FH+'px';

  [c0,c1,c2].forEach(function(c){
    c.width  = FW*PR;
    c.height = FH*PR;
    c.style.width  = FW+'px';
    c.style.height = FH+'px';
  });

  x0.setTransform(PR,0,0,PR,0,0);
  x1.setTransform(PR,0,0,PR,0,0);
  x2.setTransform(PR,0,0,PR,0,0);

  drawField();
  renderAll();
}

// ════════════════════════════════════
//  PLAYERS
// ════════════════════════════════════
function buildPlayers(){
  var cy=FH/2;
  return[
    {id:'A1',t:'A',n:1, x:FW*.07, y:cy},
    {id:'A2',t:'A',n:2, x:FW*.22, y:FH*.22},
    {id:'A3',t:'A',n:3, x:FW*.22, y:FH*.78},
    {id:'A4',t:'A',n:4, x:FW*.35, y:FH*.38},
    {id:'A5',t:'A',n:5, x:FW*.42, y:cy},
    {id:'B1',t:'B',n:1, x:FW*.93, y:cy},
    {id:'B2',t:'B',n:2, x:FW*.78, y:FH*.22},
    {id:'B3',t:'B',n:3, x:FW*.78, y:FH*.78},
    {id:'B4',t:'B',n:4, x:FW*.65, y:FH*.65},
    {id:'B5',t:'B',n:5, x:FW*.58, y:cy},
    {id:'ball',t:'ball',n:0, x:FW*.5, y:FH*.5},
  ];
}

// ════════════════════════════════════
//  DRAW FIELD
// ════════════════════════════════════
function drawField(){
  var ctx=x0;
  ctx.clearRect(0,0,FW,FH);
  var p=8, fw=FW-p*2, fh=FH-p*2, fx=p, fy=p;
  var cx=FW/2, cy=FH/2;

  // نوارهای چمن
  var ns=8, sw=fw/ns;
  for(var i=0;i<ns;i++){
    ctx.fillStyle=i%2===0?'#1a5c35':'#186033';
    ctx.fillRect(fx+i*sw,fy,sw,fh);
  }

  ctx.strokeStyle='rgba(255,255,255,0.88)';
  ctx.lineWidth=2;

  // کادر
  ctx.strokeRect(fx,fy,fw,fh);

  // خط مرکزی
  ctx.beginPath(); ctx.moveTo(cx,fy); ctx.lineTo(cx,fy+fh); ctx.stroke();

  // دایره مرکزی
  var cr=fw*0.08;
  ctx.beginPath(); ctx.arc(cx,cy,cr,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fill(); ctx.stroke();

  // نقطه مرکزی
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill();

  var pd=fw*0.15, ph=fh*0.5, py=fy+(fh-ph)/2;
  var gd=fw*0.09, gh=fh*0.3, gy=fy+(fh-gh)/2;
  var goalH=fh*0.22, goalY=fy+(fh-goalH)/2;

  ctx.strokeStyle='rgba(255,255,255,0.88)';

  // محدوده دروازه‌بان
  ctx.fillStyle='rgba(255,255,255,0.04)';
  ctx.fillRect(fx,py,pd,ph); ctx.strokeRect(fx,py,pd,ph);
  ctx.fillRect(fx+fw-pd,py,pd,ph); ctx.strokeRect(fx+fw-pd,py,pd,ph);

  // محدوده کوچک
  ctx.strokeRect(fx,gy,gd,gh);
  ctx.strokeRect(fx+fw-gd,gy,gd,gh);

  // دروازه‌ها
  ctx.fillStyle='#0a3a1c';
  ctx.fillRect(fx-9,goalY,9,goalH); ctx.strokeRect(fx-9,goalY,9,goalH);
  ctx.fillRect(fx+fw,goalY,9,goalH); ctx.strokeRect(fx+fw,goalY,9,goalH);

  // نقاط پنالتی
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.beginPath(); ctx.arc(fx+pd,cy,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(fx+fw-pd,cy,3,0,Math.PI*2); ctx.fill();

  // قوس گوشه
  var ar=fw*0.025;
  [[fx,fy,0,Math.PI*.5],[fx+fw,fy,.5*Math.PI,Math.PI],[fx+fw,fy+fh,Math.PI,1.5*Math.PI],[fx,fy+fh,1.5*Math.PI,2*Math.PI]].forEach(function(a){
    ctx.beginPath(); ctx.arc(a[0],a[1],ar,a[2],a[3]); ctx.stroke();
  });
}

// ════════════════════════════════════
//  RENDER PLAYERS + DRAWINGS
// ════════════════════════════════════
function renderAll(){
  renderDrawings();
  renderPlayers();
}

function renderPlayers(){
  var ctx=x2;
  ctx.clearRect(0,0,FW,FH);
  players.forEach(function(p){ drawPlayer(ctx,p); });
}

function renderDrawings(){
  var ctx=x1;
  ctx.clearRect(0,0,FW,FH);
  paths.forEach(function(p){ drawPath(ctx,p); });
  if(curPath) drawPath(ctx,curPath);
}

function drawPlayer(ctx,p){
  var isBall=p.id==='ball';
  var r=isBall?12:16;
  var col=isBall?'#fbbf24':p.t==='A'?'#ef4444':'#3b82f6';

  ctx.save();
  ctx.shadowColor=col; ctx.shadowBlur=isBall?8:12;
  ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
  ctx.fillStyle=col; ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(0,0,0,0.45)'; ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.shadowBlur=0;
  if(!isBall){
    ctx.fillStyle='#fff';
    ctx.font='bold '+(p.n>=10?10:13)+'px system-ui';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.n,p.x,p.y);
  } else {
    ctx.font='13px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⚽',p.x,p.y);
  }
  ctx.restore();
}

function drawPath(ctx,p){
  if(!p||!p.pts||p.pts.length<2) return;
  ctx.save();
  ctx.strokeStyle=p.c; ctx.fillStyle=p.c;
  ctx.lineWidth=p.w; ctx.lineCap='round'; ctx.lineJoin='round';

  if(p.type==='pen'){
    ctx.beginPath(); ctx.moveTo(p.pts[0].x,p.pts[0].y);
    for(var i=1;i<p.pts.length-1;i++){
      var mx=(p.pts[i].x+p.pts[i+1].x)/2, my=(p.pts[i].y+p.pts[i+1].y)/2;
      ctx.quadraticCurveTo(p.pts[i].x,p.pts[i].y,mx,my);
    }
    ctx.lineTo(p.pts[p.pts.length-1].x,p.pts[p.pts.length-1].y);
    ctx.stroke();
  }
  else if(p.type==='line'){
    var s=p.pts[0],e=p.pts[p.pts.length-1];
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(e.x,e.y); ctx.stroke();
  }
  else if(p.type==='arrow'){
    var s=p.pts[0],e=p.pts[p.pts.length-1];
    var dx=e.x-s.x,dy=e.y-s.y,len=Math.sqrt(dx*dx+dy*dy);
    if(len<8){ctx.restore();return;}
    var ux=dx/len,uy=dy/len,aw=10,al=16;
    ctx.beginPath(); ctx.moveTo(s.x,s.y);
    ctx.lineTo(e.x-al*0.6*ux,e.y-al*0.6*uy); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.x,e.y);
    ctx.lineTo(e.x-al*ux+aw*uy,e.y-al*uy-aw*ux);
    ctx.lineTo(e.x-al*ux-aw*uy,e.y-al*uy+aw*ux);
    ctx.closePath(); ctx.fill();
  }
  else if(p.type==='zone'){
    var xs=p.pts.map(function(pt){return pt.x;}), ys=p.pts.map(function(pt){return pt.y;});
    var minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs);
    var minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
    var r=Math.max((maxX-minX)/2,(maxY-minY)/2,12);
    var cx=(minX+maxX)/2,cy=(minY+maxY)/2;
    ctx.setLineDash([8,5]);
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.stroke(); ctx.globalAlpha=0.15; ctx.fill();
    ctx.globalAlpha=1; ctx.setLineDash([]);
  }
  ctx.restore();
}

// ════════════════════════════════════
//  TOUCH
// ════════════════════════════════════
function getPos(e){
  var r=c2.getBoundingClientRect();
  var t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left, y:t.clientY-r.top};
}

function findPlayer(x,y){
  var best=null, bestD=9999;
  players.forEach(function(p){
    var r=p.id==='ball'?20:24;
    var d=Math.sqrt((p.x-x)*(p.x-x)+(p.y-y)*(p.y-y));
    if(d<r&&d<bestD){bestD=d;best=p;}
  });
  return best;
}

function clampPos(x,y){
  return {x:Math.max(14,Math.min(FW-14,x)), y:Math.max(14,Math.min(FH-14,y))};
}

c2.addEventListener('touchstart',function(e){
  e.preventDefault();
  var pos=getPos(e);
  if(tool==='select'){
    var p=findPlayer(pos.x,pos.y);
    if(p) drag={player:p, ox:pos.x-p.x, oy:pos.y-p.y};
    return;
  }
  curPath={type:tool, pts:[{x:pos.x,y:pos.y}], c:color, w:lw};
},{passive:false});

c2.addEventListener('touchmove',function(e){
  e.preventDefault();
  var pos=getPos(e);
  if(tool==='select'&&drag){
    var c=clampPos(pos.x-drag.ox, pos.y-drag.oy);
    drag.player.x=c.x; drag.player.y=c.y;
    renderPlayers(); return;
  }
  if(curPath){
    if(tool==='arrow'||tool==='line'){
      curPath.pts=[curPath.pts[0],{x:pos.x,y:pos.y}];
    } else {
      curPath.pts.push({x:pos.x,y:pos.y});
    }
    renderDrawings();
  }
},{passive:false});

c2.addEventListener('touchend',function(e){
  e.preventDefault();
  drag=null;
  if(curPath&&curPath.pts.length>=2){
    if(tool==='arrow'||tool==='line'){
      curPath.pts=[curPath.pts[0],curPath.pts[curPath.pts.length-1]];
    }
    paths.push({type:curPath.type,pts:curPath.pts.slice(),c:curPath.c,w:curPath.w});
  }
  curPath=null;
  renderDrawings();
},{passive:false});

// ════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════
function setTool(el){
  tool=el.dataset.t;
  document.querySelectorAll('.tool-btn[data-t]').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
}

function setC(el){
  color=el.dataset.c;
  document.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('on');});
  el.classList.add('on');
}

function setW(el){
  lw=parseInt(el.dataset.w);
  document.querySelectorAll('.wbtn').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
}

function undo(){ paths.pop(); renderDrawings(); }

function resetAll(){
  if(!confirm('همه چیز پاک شود؟')) return;
  paths=[]; keyframes=[]; curFrame=0;
  players=buildPlayers();
  stopPlay(); updateFrameUI(); renderAll();
}

// ════════════════════════════════════
//  ANIMATION
// ════════════════════════════════════
function addFrame(){
  keyframes.push({players:players.map(function(p){return Object.assign({},p);})});
  curFrame=keyframes.length-1;
  updateFrameUI();
  toast('فریم '+keyframes.length+' اضافه شد ✓');
}

function rmFrame(){
  keyframes.pop();
  curFrame=Math.max(0,curFrame-1);
  updateFrameUI();
}

function gotoFrame(i){
  if(!keyframes[i]) return;
  curFrame=i;
  players=keyframes[i].players.map(function(p){return Object.assign({},p);});
  updateFrameUI();
  renderPlayers();
}

function togglePlay(){
  if(playing){stopPlay();return;}
  if(keyframes.length<2){toast('حداقل ۲ فریم نیاز است');return;}
  playing=true;
  document.getElementById('playBtn').textContent='⏹ توقف';
  document.getElementById('playBtn').className='abtn stop';
  var i=0;
  timer=setInterval(function(){
    gotoFrame(i);
    i=(i+1)%keyframes.length;
    if(i===0){stopPlay();}
  }, speeds[speedIdx]);
}

function stopPlay(){
  clearInterval(timer); playing=false;
  document.getElementById('playBtn').textContent='▶ پخش';
  document.getElementById('playBtn').className='abtn play';
}

function cycleSpeed(){
  speedIdx=(speedIdx+1)%speeds.length;
  document.getElementById('spBtn').textContent=['1x','1.5x','2x'][speedIdx];
}

function updateFrameUI(){
  document.getElementById('fcount').textContent=keyframes.length;
  document.getElementById('rmBtn').style.display=keyframes.length?'':'none';
  var row=document.getElementById('frames');
  row.innerHTML='';
  keyframes.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='fdot'+(i===curFrame?' on':'');
    d.textContent=i+1;
    d.onclick=function(){gotoFrame(i);};
    row.appendChild(d);
  });
}

// ════════════════════════════════════
//  SAVE / EXPORT
// ════════════════════════════════════
function openSave(){document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}

function doSave(){
  var name=document.getElementById('pname').value||'تاکتیک';
  var all=JSON.parse(localStorage.getItem('fp')||'[]');
  all.unshift({id:Date.now(),name:name,
    players:players.map(function(p){return Object.assign({},p);}),
    paths:paths.slice(), keyframes:keyframes.slice()});
  localStorage.setItem('fp',JSON.stringify(all));
  closeModal(); toast('✅ ذخیره شد');
}

function exportImg(){
  var m=document.createElement('canvas');
  m.width=FW*PR; m.height=FH*PR;
  var mc=m.getContext('2d');
  mc.drawImage(c0,0,0); mc.drawImage(c1,0,0); mc.drawImage(c2,0,0);
  var a=document.createElement('a');
  a.download='futsal.png'; a.href=m.toDataURL('image/png'); a.click();
  toast('📤 خروجی گرفته شد');
}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

// ════════════════════════════════════
//  START
// ════════════════════════════════════
window.addEventListener('load', function(){
  setupCanvas();
  players=buildPlayers();
  renderAll();
});

window.addEventListener('resize', function(){
  setupCanvas();
  players=buildPlayers();
  renderAll();
});
</script>
